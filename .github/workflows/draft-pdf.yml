name: Draft PDF

# Compile the JOSS paper (paper/paper.md) on every change using the official
# Open Journals / JOSS toolchain (inara). The compiled PDF is uploaded as a build
# artifact, so we can verify the paper compiles cleanly under JOSS's own pipeline.

on:
  push:
    paths:
      - 'paper/**'
      - '.github/workflows/draft-pdf.yml'
  pull_request:
    paths:
      - 'paper/**'
  workflow_dispatch:

jobs:
  paper:
    runs-on: ubuntu-latest
    name: Paper Draft
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build draft PDF
        uses: openjournals/openjournals-draft-action@master
        with:
          journal: joss
          paper-path: paper/paper.md

      - name: Upload compiled paper
        uses: actions/upload-artifact@v4
        with:
          name: paper
          # This is the output path of the openjournals action.
          path: paper/paper.pdf
